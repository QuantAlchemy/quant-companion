  <circle cx="233" cy="145" r="15" fill="url(#spark)"/>

  <!-- wordmark -->
  <text x="390" y="266" font-family="DejaVu Serif" font-weight="bold" font-size="70" fill="#E9ECF8">Quant <tspan fill="#B48CFF">Companion</tspan></text>

  <rect x="394" y="302" width="180" height="4" rx="2" fill="url(#goldline)"/>

  <text x="392" y="372" font-family="DejaVu Sans" font-size="31" fill="#A7AECB">Strategy analytics · Trading journal · Risk sizing</text>

  <text x="392" y="434" font-family="DejaVu Sans Mono" font-size="23" fill="#8A93B2">quant-companion.quantalchemy.io</text>

  <text x="120" y="565" font-family="DejaVu Sans" font-size="25" fill="#6B7394">Forged by Quant Alchemy</text>
