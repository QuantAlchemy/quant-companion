      <stop offset="55%" stop-color="#6D4FFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6D4FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldglow" cx="0.85" cy="0.9" r="0.6">
